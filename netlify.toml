[build]
  command = "cd mycareer/frontend && npm run build"
  publish = "mycareer/frontend/dist"
  functions = "netlify/functions"

[dev]
  framework = "vite"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
